<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillScope - AI Skills 发现与筛选</title>
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <section class="hero">
        <div class="brand-lockup">
          <img src="./assets/logo.svg" alt="SkillScope logo">
          <div>
            <p class="brand-mark">SkillScope</p>
            <p class="brand-subtitle">AI Skills 发现与筛选目录</p>
          </div>
        </div>
        <h1>发现值得使用的 AI Skills</h1>
        <p class="hero-copy">
          汇集来自 GitHub 的优质 AI Skills，以卡片方式呈现核心能力、使用场景与来源，帮助你快速判断、比较并找到值得深入了解的工具。
        </p>
      </section>

      <section class="filter-panel" aria-labelledby="controls-title">
        <div class="panel-head">
          <div>
            <p class="content-kicker">筛选</p>
            <h2 id="controls-title">缩小范围</h2>
          </div>
        </div>

        <div class="controls-grid">
          <label class="field">
            <span>搜索 Skill</span>
            <input id="searchInput" type="search" placeholder="名称、场景或标签">
          </label>
          <label class="field">
            <span>类别</span>
            <select id="categoryFilter">
              <option value="all">全部类别</option>
            </select>
          </label>
          <label class="field">
            <span>适用人群</span>
            <select id="audienceFilter">
              <option value="all">全部人群</option>
            </select>
          </label>
        </div>
      </section>
    </aside>

    <main class="results-panel">
      <section class="grid-wrap" aria-labelledby="cards-title">
        <div class="grid-head">
          <div>
            <p class="content-kicker">全部 Skills</p>
            <h2 id="cards-title">浏览卡片列表</h2>
          </div>
          <p id="resultCount" class="result-count">0 个 Skills</p>
        </div>
        <div id="cardGrid" class="card-grid"></div>

        <section class="feedback-panel" aria-labelledby="feedback-title">
          <div>
            <p class="content-kicker">反馈</p>
            <h2 id="feedback-title">想推荐新的 Skill？</h2>
            <p>如果你发现值得收录的 AI Skill，可以通过 GitHub Discussions 留下项目链接和简要说明。</p>
          </div>
          <a class="feedback-link" href="https://github.com/wangyi2222/skill-scope/discussions" target="_blank" rel="noreferrer">
            前往反馈
          </a>
        </section>
      </section>
    </main>
  </div>

  <script src="./data.js"></script>
  <script src="./main.js"></script>
</body>
</html>
