<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillScope - AI Skills 发现与筛选</title>
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="brand-lockup">
        <img src="./assets/logo.svg" alt="SkillScope logo">
        <div>
          <p class="brand-mark">SkillScope</p>
          <p class="brand-subtitle">AI Skills 发现与筛选目录</p>
        </div>
      </div>
      <h1>精选 Skills，快速找到合适工具</h1>
      <p class="hero-copy">
        以卡片方式整理 AI Skills，按平台、用途和适用人群筛选，帮助你快速了解作用，并跳转到 GitHub 查看详情。
      </p>
    </header>

    <main class="content">
      <section class="filter-panel" aria-labelledby="controls-title">
        <div class="panel-head">
          <div>
            <p class="content-kicker">筛选</p>
            <h2 id="controls-title">搜索与筛选</h2>
          </div>
          <p class="panel-note">用更少的操作，更快找到合适的 Skill。</p>
        </div>

        <div class="controls-grid">
          <label class="field">
            <span>搜索 Skill</span>
            <input id="searchInput" type="search" placeholder="输入名称、场景或标签">
          </label>
          <label class="field">
            <span>平台</span>
            <select id="platformFilter">
              <option value="all">全部平台</option>
            </select>
          </label>
          <label class="field">
            <span>类别</span>
            <select id="categoryFilter">
              <option value="all">全部类别</option>
            </select>
          </label>
          <label class="field">
            <span>适用人群</span>
            <select id="audienceFilter">
              <option value="all">全部人群</option>
            </select>
          </label>
        </div>
      </section>

      <section class="grid-wrap" aria-labelledby="cards-title">
        <div class="grid-head">
          <div>
            <p class="content-kicker">全部 Skills</p>
            <h2 id="cards-title">浏览卡片列表</h2>
          </div>
          <p id="resultCount" class="result-count">0 个 Skills</p>
        </div>
        <div id="cardGrid" class="card-grid"></div>
      </section>
    </main>
  </div>

  <script src="./data.js"></script>
  <script src="./main.js"></script>
</body>
</html>
